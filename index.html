<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Leben · Mesas</title>
<style>
  :root{
    --bg:#eef0f2; --panel:#ffffff; --ink:#25292e; --muted:#7a828c;
    --line:#dfe3e8; --brand:#f08a24; --brand2:#3b414a;
    --free:#dff5e4; --free-b:#2ea34f;
    --busy:#fbe0dd; --busy-b:#e03b2b;
    --pay:#dde8fb; --pay-b:#2f6fe0;
    --shadow:0 4px 16px rgba(0,0,0,.08);
  }
  html[data-theme="dark"]{
    --bg:#14171b; --panel:#1c2127; --ink:#eef1f5; --muted:#98a2ae;
    --line:#2b323b; --free:#183a24; --free-b:#33b158;
    --busy:#3f1c17; --busy-b:#e8483a; --pay:#16294a; --pay-b:#4d84e6;
    --shadow:0 4px 16px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:var(--bg);color:var(--ink);overflow:hidden;height:100vh}
  button{font-family:inherit;cursor:pointer;border:none;font-size:15px}
  input{font-family:inherit}

  .topbar{height:54px;display:flex;align-items:center;gap:10px;padding:0 14px;
    background:var(--brand2);color:#fff;position:relative;z-index:5}
  .brand-name{font-weight:800;font-size:17px;flex:1;white-space:nowrap;overflow:hidden;
    text-overflow:ellipsis;cursor:pointer}
  .tb-btn{background:rgba(255,255,255,.12);color:#fff;padding:8px 13px;border-radius:9px;
    display:flex;align-items:center;gap:6px;font-weight:600}
  .tb-btn:hover{background:rgba(255,255,255,.22)}
  .tb-btn.active{background:var(--brand)}

  .screen{position:absolute;inset:54px 0 0 0;display:flex;flex-direction:column}

  /* ---- sala tabs ---- */
  .sala-tabs{display:flex;align-items:center;gap:2px;padding:8px 10px 0;background:var(--panel);
    border-bottom:1px solid var(--line);overflow-x:auto;flex-shrink:0}
  .sala-tabs .st{padding:9px 16px;border-radius:9px 9px 0 0;background:transparent;color:var(--muted);
    font-weight:700;white-space:nowrap;border:1px solid transparent;border-bottom:none}
  .sala-tabs .st.active{background:var(--bg);color:var(--ink);border-color:var(--line)}
  .sala-tabs .st.add{color:var(--brand)}

  #map{position:absolute;inset:0;overflow:auto;
    background-image:radial-gradient(var(--line) 1.2px,transparent 1.2px);background-size:28px 28px}
  .table{position:absolute;width:66px;height:66px;border-radius:12px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    border:2px solid var(--free-b);background:var(--free);color:var(--ink);
    box-shadow:var(--shadow);user-select:none;touch-action:none}
  .table.round{border-radius:50%}
  .table.busy{border-color:var(--busy-b);background:var(--busy)}
  .table.pay{border-color:var(--pay-b);background:var(--pay)}
  .table .t-name{font-weight:800;font-size:22px;line-height:1}
  .table .t-total{font-size:11px;font-weight:700;margin-top:3px;color:var(--busy-b)}
  .table.editing{cursor:grab;outline:2px dashed var(--brand);outline-offset:2px}
  .table.dragging{z-index:10;cursor:grabbing;filter:brightness(1.05)}
  .map-hint{position:sticky;top:10px;margin:10px auto;width:max-content;color:var(--muted);
    font-size:13px;background:var(--panel);padding:7px 15px;border-radius:20px;box-shadow:var(--shadow)}

  .fab{position:absolute;bottom:18px;right:18px;display:flex;gap:10px;z-index:6}
  .fab button{background:var(--brand);color:#fff;padding:12px 18px;border-radius:26px;
    font-weight:700;box-shadow:var(--shadow)}
  .fab button.ghost{background:var(--panel);color:var(--ink);border:1px solid var(--line)}
  .legend{position:absolute;bottom:20px;left:18px;display:flex;gap:12px;background:var(--panel);
    padding:8px 12px;border-radius:12px;box-shadow:var(--shadow);font-size:12px;z-index:6}
  .legend span{display:flex;align-items:center;gap:5px;color:var(--muted)}
  .dot{width:11px;height:11px;border-radius:3px;border:2px solid}
  .dot.f{background:var(--free);border-color:var(--free-b)}
  .dot.b{background:var(--busy);border-color:var(--busy-b)}
  .dot.p{background:var(--pay);border-color:var(--pay-b)}

  /* ---- overlay ---- */
  .overlay{position:absolute;inset:0;z-index:20;background:var(--bg);display:none;flex-direction:column}
  .overlay.show{display:flex}
  .ov-head{height:54px;display:flex;align-items:center;gap:10px;padding:0 12px;
    background:var(--brand2);color:#fff}
  .ov-head h2{margin:0;font-size:17px;flex:1}
  .back{background:rgba(255,255,255,.15);color:#fff;border-radius:9px;padding:9px 14px;font-weight:700}
  .ov-body{flex:1;display:flex;overflow:hidden}
  @media(max-width:820px){.ov-body{flex-direction:column}}

  .menu-side{flex:1.35;overflow:auto;padding:12px;display:flex;flex-direction:column}
  .searchbar{display:flex;gap:8px;margin-bottom:10px}
  .searchbar .plus{background:var(--brand);color:#fff;width:44px;border-radius:10px;font-size:22px;font-weight:700;flex-shrink:0}
  .searchbar input{flex:1;padding:11px 14px;border-radius:10px;border:1px solid var(--line);
    background:var(--panel);color:var(--ink);font-size:15px}
  .cat-tabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:10px}
  .cat-tabs button{white-space:nowrap;padding:8px 14px;border-radius:18px;background:var(--panel);
    color:var(--ink);border:1px solid var(--line);font-weight:600}
  .cat-tabs button.active{background:var(--brand2);color:#fff;border-color:var(--brand2)}
  .prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px;align-content:start}
  .prod{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 12px;
    text-align:left;color:var(--ink);display:flex;flex-direction:column;gap:4px;min-height:64px}
  .prod:active{background:var(--busy)}
  .prod .p-name{font-weight:700;font-size:14px;line-height:1.15}
  .prod .p-price{color:var(--brand);font-weight:800;font-size:13px}

  .order-side{flex:1;background:var(--panel);border-left:1px solid var(--line);
    display:flex;flex-direction:column;min-width:320px}
  @media(max-width:820px){.order-side{border-left:none;border-top:1px solid var(--line);max-height:46vh}}
  .ord-info{padding:12px 14px;border-bottom:1px solid var(--line);background:var(--bg)}
  .ord-id{font-weight:800;color:var(--brand);font-size:15px}
  .ord-meta{display:flex;flex-direction:column;gap:5px;margin-top:8px;font-size:13px}
  .ord-meta .row{display:flex;gap:8px;align-items:center}
  .ord-meta .lbl{color:var(--muted);width:56px;flex-shrink:0}
  .ord-meta input{flex:1;padding:7px 9px;border-radius:8px;border:1px solid var(--line);
    background:var(--panel);color:var(--ink);font-size:14px;font-weight:600}

  .order-list{flex:1;overflow:auto;padding:6px 14px}
  .empty{color:var(--muted);text-align:center;margin-top:36px;font-size:14px}
  .line{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--line)}
  .line .l-qtybox{display:flex;align-items:center;gap:5px}
  .line .l-qtybox button{width:26px;height:26px;border-radius:7px;background:var(--bg);color:var(--ink);
    font-weight:800;font-size:16px;border:1px solid var(--line)}
  .line .l-qtybox span{min-width:16px;text-align:center;font-weight:800}
  .line .l-main{flex:1;min-width:0}
  .line .l-name{font-weight:600;font-size:14px}
  .line .l-name .sent{font-size:10px;background:#41a35a;color:#fff;padding:1px 5px;border-radius:5px;margin-left:5px}
  .line .l-note{font-size:12px;color:var(--muted);font-style:italic}
  .line .l-note-btn{font-size:11px;color:var(--brand);background:none;padding:1px 0}
  .line .l-sub{font-weight:700;font-size:14px;white-space:nowrap}
  .line .l-x{background:none;color:var(--muted);font-size:20px;padding:0 4px;line-height:1}

  .order-foot{border-top:1px solid var(--line);padding:12px 14px;background:var(--bg)}
  .sumrow{display:flex;justify-content:space-between;font-size:14px;color:var(--muted);margin:2px 0}
  .sumrow.disc{color:var(--busy-b);font-weight:700}
  .sumrow.disc .x{cursor:pointer;margin-left:6px}
  .totrow{display:flex;justify-content:space-between;font-size:22px;font-weight:800;margin:8px 0 12px}
  .act-row{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .btn{padding:13px;border-radius:11px;font-weight:800;font-size:14px}
  .btn.kitchen{background:var(--brand2);color:#fff}
  .btn.disc{background:var(--panel);color:var(--ink);border:1px solid var(--line)}
  .btn.pay{background:var(--brand);color:#fff}
  .btn.wide{grid-column:1/3}
  .btn.danger{background:transparent;color:var(--busy-b);border:1px solid var(--busy-b)}
  .btn:disabled{opacity:.4}

  /* config */
  .cfg{max-width:720px;margin:0 auto;padding:18px;width:100%}
  .cfg h3{margin:20px 0 9px;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
  .field label{font-size:12px;color:var(--muted);font-weight:600}
  .field input{padding:11px;border-radius:10px;border:1px solid var(--line);background:var(--panel);
    color:var(--ink);font-size:15px}
  .mi-row{display:flex;gap:7px;align-items:center;background:var(--panel);border:1px solid var(--line);
    border-radius:10px;padding:7px;margin-bottom:7px}
  .mi-row input{flex:1;min-width:0;padding:9px;border-radius:8px;border:1px solid var(--line);
    background:var(--bg);color:var(--ink)}
  .mi-row input.price{flex:0 0 92px}
  .mi-row input.cat{flex:0 0 130px}
  .mi-row .del{background:transparent;color:var(--busy-b);font-size:22px;padding:0 8px}
  .add-btn{background:var(--brand2);color:#fff;padding:11px 16px;border-radius:10px;font-weight:700}
  .save-bar{position:sticky;bottom:0;background:var(--panel);border-top:1px solid var(--line);
    padding:12px;display:flex;gap:9px;margin:18px -18px -18px}
  .save-bar .btn.pay{flex:1}

  /* print — Epson TM-T20 · 80mm */
  #printArea{display:none}
  @media print{
    body *{visibility:hidden}
    #printArea,#printArea *{visibility:visible}
    #printArea{display:block;position:absolute;left:0;top:0;width:72mm;
      font-family:'Courier New',monospace;color:#000}
    @page{size:80mm auto;margin:0}
  }
  .rcpt{font-family:'Courier New',monospace;color:#000;font-size:13px;line-height:1.35;padding:2mm 2mm}
  .rcpt .r-c{text-align:center}
  .rcpt .r-title{font-weight:700;font-size:15px;letter-spacing:1px}
  .rcpt .r-line{display:flex;justify-content:space-between;white-space:pre}
  .rcpt .r-line .amt{text-align:right}
  .rcpt .sp{height:8px}
  .rcpt .big{font-size:17px;font-weight:700}
  .rcpt .r-note{padding-left:22px;font-style:italic;font-size:12px}

  .modal{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:40;display:none;
    align-items:center;justify-content:center;padding:20px}
  .modal.show{display:flex}
  .modal-box{background:var(--panel);border-radius:15px;padding:20px;max-width:360px;width:100%;box-shadow:var(--shadow)}
  .modal-box h3{margin:0 0 12px}
  .modal-box input{width:100%;padding:12px;border-radius:10px;border:1px solid var(--line);
    background:var(--bg);color:var(--ink);font-size:16px;margin-bottom:12px}
  .modal-row{display:flex;gap:9px}
  .modal-row button{flex:1;padding:12px;border-radius:10px;font-weight:700}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand-name" id="brandName" onclick="editRestaurantName()">Leben Brewing Co</div>
  <button class="tb-btn active" id="navMap" onclick="showMap()">🗺️ Mesas</button>
  <button class="tb-btn" onclick="openConfig()">⚙️ Menú</button>
  <button class="tb-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
</div>

<!-- ===== MAPA ===== -->
<div class="screen" id="mapScreen">
  <div class="sala-tabs" id="salaTabs"></div>
  <div style="position:relative;flex:1;overflow:hidden">
    <div id="map"></div>
    <div class="legend">
      <span><i class="dot f"></i>Libre</span>
      <span><i class="dot b"></i>Ocupada</span>
      <span><i class="dot p"></i>Por cobrar</span>
    </div>
    <div class="fab">
      <button class="ghost" id="editBtn" onclick="toggleEdit()">✏️ Editar</button>
      <button id="addTableBtn" onclick="addTable()" style="display:none">➕ Mesa</button>
    </div>
  </div>
</div>

<!-- ===== COMANDA ===== -->
<div class="overlay" id="orderScreen">
  <div class="ov-head">
    <button class="back" onclick="showMap()">← Mesas</button>
    <h2 id="orderTitle">Mesa</h2>
  </div>
  <div class="ov-body">
    <div class="menu-side">
      <div class="searchbar">
        <button class="plus" onclick="addCustom()" title="Producto suelto">+</button>
        <input id="search" placeholder="Buscar producto..." oninput="renderProds()">
      </div>
      <div class="cat-tabs" id="catTabs"></div>
      <div class="prod-grid" id="prodGrid"></div>
    </div>
    <div class="order-side">
      <div class="ord-info">
        <div class="ord-id" id="ordId">Pedido nuevo</div>
        <div class="ord-meta">
          <div class="row"><span class="lbl">Inicio</span><span id="ordTime">—</span></div>
          <div class="row"><span class="lbl">Cliente</span>
            <input id="ordClient" placeholder="Nombre (opcional)" oninput="setClient(this.value)"></div>
        </div>
      </div>
      <div class="order-list" id="orderList"></div>
      <div class="order-foot">
        <div class="sumrow"><span>Subtotal</span><span id="ordSub">$0,00</span></div>
        <div class="sumrow disc" id="discRow" style="display:none">
          <span id="discLbl">Descuento</span>
          <span><span id="discAmt">$0,00</span><span class="x" onclick="setDiscount(0)"> ✕</span></span>
        </div>
        <div class="totrow"><span>Total</span><span id="ordTotal">$0,00</span></div>
        <div class="act-row">
          <button class="btn disc" onclick="askDiscount()">% Descuento</button>
          <button class="btn kitchen" id="kitchenBtn" onclick="sendToKitchen()">🍳 Comanda</button>
          <button class="btn pay wide" onclick="printTicket()">🧾 Cobrar / Imprimir ticket</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ===== CONFIG ===== -->
<div class="overlay" id="configScreen">
  <div class="ov-head"><button class="back" onclick="showMap()">← Mesas</button><h2>Editar menú</h2></div>
  <div class="ov-body" style="display:block;overflow:auto">
    <div class="cfg">
      <div class="field"><label>Nombre del local</label><input id="cfgName" type="text"></div>
      <div class="field"><label>Cierre del ticket</label><input id="cfgFoot" type="text"></div>
      <h3>Productos</h3>
      <div id="menuEditor"></div>
      <button class="add-btn" onclick="addMenuItem()">➕ Agregar producto</button>
      <div class="save-bar">
        <button class="btn danger" onclick="showMap()" style="flex:0 0 auto;padding:12px 18px">Cancelar</button>
        <button class="btn pay" onclick="saveConfig()">Guardar cambios</button>
      </div>
    </div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-box">
    <h3 id="modalTitle">Título</h3>
    <input id="modalInput" type="text">
    <div class="modal-row">
      <button class="back" style="background:var(--bg);color:var(--ink)" onclick="closeModal()">Cancelar</button>
      <button class="btn pay" onclick="confirmModal()">OK</button>
    </div>
  </div>
</div>

<div id="printArea"></div>

<script>
/* ============ ESTADO ============ */
function t(){return 'id'+(t._n=(t._n||0)+1)+Math.random().toString(36).slice(2,6)}
function mkTables(arr){return arr.map(([name,x,y])=>({id:t(),name:String(name),x,y,shape:'square'}))}

const DEFAULT = {
  restaurant:"Leben Brewing Co",
  ticketFoot:"Gracias por venir a Leben Brewing Co :)",
  theme:"light",
  nextOrderId:3636,
  salas:[
    {id:t(),name:"Arriba",tables:mkTables([
      [21,430,110],[22,430,175],[23,430,240],
      [26,110,300],[25,180,300],[24,290,295],
      [28,110,365],[27,180,365]])},
    {id:t(),name:"Patio",tables:mkTables([
      [74,15,15],[73,80,15],[72,145,15],[71,210,15],[3,320,15],[2,385,15],[1,450,15],
      [422,520,110],[420,585,110],
      [6,175,155],[5,320,155],[4,400,155],
      [8,320,215],[7,400,215],
      [9,175,275],
      [12,175,335],[11,240,335],[10,320,335],[666,490,335]])},
    {id:t(),name:"SUM.",tables:mkTables([
      [47,90,110],[45,170,110],[43,250,110],[40,450,110],
      [46,90,275],[44,170,275],[42,385,275],[41,470,275]])},
    {id:t(),name:"Vereda",tables:[]},
  ],
  menu:[
    {id:t(),cat:"Cervezas",name:"Golden",price:3500},
    {id:t(),cat:"Cervezas",name:"Lager",price:3500},
    {id:t(),cat:"Cervezas",name:"APA",price:3800},
    {id:t(),cat:"Cervezas",name:"Pale Ale",price:3800},
    {id:t(),cat:"Cervezas",name:"IPA",price:4200},
    {id:t(),cat:"Cervezas",name:"Hazy IPA",price:4500},
    {id:t(),cat:"Cervezas",name:"Irish Extra Stout",price:4500},
    {id:t(),cat:"Tragos",name:"Fernet c/Coca",price:5500},
    {id:t(),cat:"Tragos",name:"Gin & Tonica",price:6500},
    {id:t(),cat:"Tragos",name:"Vermú c/Soda",price:5000},
    {id:t(),cat:"Cocina",name:"Empanada de Carne",price:4600},
    {id:t(),cat:"Cocina",name:"Empanada de Pollo",price:4600},
    {id:t(),cat:"Cocina",name:"Empanada de Verdura",price:4600},
    {id:t(),cat:"Cocina",name:"Papas fritas",price:6500},
    {id:t(),cat:"Cocina",name:"Hamburguesa",price:8500},
    {id:t(),cat:"Cocina",name:"Nachos con cheddar",price:7500},
    {id:t(),cat:"Cocina",name:"Picada para 2",price:15000},
  ],
  orders:{}
};

let S = load();
let editMode=false, currentTable=null, currentSala=null, currentCat=null, modalCb=null;

function load(){
  try{const r=JSON.parse(localStorage.getItem('leben_mesas'));if(r&&r.salas)return r;}catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT));
}
function save(){localStorage.setItem('leben_mesas',JSON.stringify(S))}
function num(n){return (n||0).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2})}
function money(n){return '$'+num(n)}
function fdate(ts){const d=new Date(ts),p=x=>String(x).padStart(2,'0');
  return `${p(d.getDate())}/${p(d.getMonth()+1)}/${String(d.getFullYear()).slice(2)} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`}
function esc(s){return (s||'').replace(/"/g,'&quot;')}

/* ============ TEMA ============ */
function applyTheme(){document.documentElement.dataset.theme=S.theme;
  document.getElementById('themeBtn').textContent=S.theme==='dark'?'☀️':'🌙'}
function toggleTheme(){S.theme=S.theme==='dark'?'light':'dark';save();applyTheme()}

/* ============ SALAS + MAPA ============ */
function curSala(){return S.salas.find(s=>s.id===currentSala)||S.salas[0]}
function tableState(id){const o=S.orders[id];if(!o||!o.lines.length)return 'free';
  return o.readyToPay?'pay':'busy'}
function orderTotal(id){const o=S.orders[id];if(!o)return 0;
  const sub=o.lines.reduce((s,l)=>s+l.price*l.qty,0);return sub*(1-(o.discount||0)/100)}

function renderSalaTabs(){
  const box=document.getElementById('salaTabs');box.innerHTML='';
  S.salas.forEach(s=>{
    const b=document.createElement('button');
    b.className='st'+(s.id===currentSala?' active':'');
    b.textContent=s.name;
    b.onclick=()=>{ if(editMode && s.id===currentSala){renameSala(s)} else {currentSala=s.id;renderSalaTabs();renderMap()} };
    box.appendChild(b);
  });
  if(editMode){
    const a=document.createElement('button');a.className='st add';a.textContent='＋ Nueva sala';
    a.onclick=addSala;box.appendChild(a);
  }
}
function renderMap(){
  const map=document.getElementById('map');map.innerHTML='';
  const sala=curSala();
  sala.tables.forEach(tb=>{
    const st=tableState(tb.id);
    const el=document.createElement('div');
    el.className='table '+(tb.shape==='round'?'round ':'')+(st==='busy'?'busy':st==='pay'?'pay':'')+(editMode?' editing':'');
    el.style.left=tb.x+'px';el.style.top=tb.y+'px';
    const tot=orderTotal(tb.id);
    el.innerHTML=`<div class="t-name">${tb.name}</div>${tot?`<div class="t-total">${money(tot)}</div>`:''}`;
    if(editMode)makeDraggable(el,tb);else el.onclick=()=>openTable(tb.id);
    map.appendChild(el);
  });
  let hint=map.querySelector('.map-hint');
  if(editMode){if(!hint){hint=document.createElement('div');hint.className='map-hint';map.appendChild(hint)}
    hint.textContent='Arrastrá para mover · Tocá una mesa para renombrar/borrar · Tocá la solapa activa para renombrar la sala';}
}
function makeDraggable(el,tb){
  let sx,sy,ox,oy,moved=false;
  el.addEventListener('pointerdown',e=>{
    e.preventDefault();sx=e.clientX;sy=e.clientY;ox=tb.x;oy=tb.y;moved=false;
    el.setPointerCapture(e.pointerId);el.classList.add('dragging');
    const move=ev=>{const dx=ev.clientX-sx,dy=ev.clientY-sy;
      if(Math.abs(dx)>4||Math.abs(dy)>4)moved=true;
      tb.x=Math.max(0,ox+dx);tb.y=Math.max(0,oy+dy);
      el.style.left=tb.x+'px';el.style.top=tb.y+'px';};
    const up=()=>{el.releasePointerCapture(e.pointerId);el.classList.remove('dragging');
      el.removeEventListener('pointermove',move);el.removeEventListener('pointerup',up);
      if(moved)save();else editTable(tb);};
    el.addEventListener('pointermove',move);el.addEventListener('pointerup',up);
  });
}
function toggleEdit(){
  editMode=!editMode;
  document.getElementById('editBtn').classList.toggle('active',editMode);
  document.getElementById('editBtn').textContent=editMode?'✅ Listo':'✏️ Editar';
  document.getElementById('addTableBtn').style.display=editMode?'block':'none';
  renderSalaTabs();renderMap();
}
function addTable(){
  const sala=curSala();
  askModal('Número de la mesa nueva','',val=>{
    if(!val)return;sala.tables.push({id:t(),name:val,x:40,y:40,shape:'square'});save();renderMap();
  });
}
function editTable(tb){
  askModal('Mesa "'+tb.name+'"',tb.name,val=>{
    if(val===null)return;
    if(val===''){if(confirm('¿Borrar la mesa '+tb.name+'?')){
      curSala().tables=curSala().tables.filter(x=>x.id!==tb.id);delete S.orders[tb.id];}}
    else{tb.name=val;tb.shape=confirm('¿Mesa redonda? (Cancelar = cuadrada)')?'round':'square';}
    save();renderMap();
  },'Borrá el texto y aceptá para eliminarla');
}
function addSala(){askModal('Nombre de la sala nueva','',val=>{
  if(!val)return;const s={id:t(),name:val,tables:[]};S.salas.push(s);currentSala=s.id;save();renderSalaTabs();renderMap();});}
function renameSala(s){askModal('Sala "'+s.name+'"',s.name,val=>{
  if(val===null)return;
  if(val===''){if(S.salas.length>1&&confirm('¿Borrar la sala '+s.name+' y sus mesas?')){
    S.salas=S.salas.filter(x=>x.id!==s.id);currentSala=S.salas[0].id;}}
  else s.name=val;
  save();renderSalaTabs();renderMap();
},'Borrá el texto y aceptá para eliminar la sala');}

/* ============ COMANDA ============ */
function openTable(id){
  currentTable=id;
  if(!S.orders[id])S.orders[id]={id:null,cliente:'',opened:Date.now(),discount:0,readyToPay:false,lines:[]};
  const tb=curSala().tables.find(x=>x.id===id);
  document.getElementById('orderTitle').textContent='Mesa '+tb.name;
  document.getElementById('search').value='';
  currentCat=[...new Set(S.menu.map(m=>m.cat))][0]||null;
  renderCats();renderProds();renderOrder();
  showScreen('orderScreen');
}
function curOrder(){return S.orders[currentTable]}
function renderCats(){
  const cats=[...new Set(S.menu.map(m=>m.cat))];
  const box=document.getElementById('catTabs');box.innerHTML='';
  cats.forEach(c=>{const b=document.createElement('button');b.textContent=c;
    b.className=c===currentCat?'active':'';b.onclick=()=>{currentCat=c;
      document.getElementById('search').value='';renderCats();renderProds()};box.appendChild(b);});
}
function renderProds(){
  const grid=document.getElementById('prodGrid');grid.innerHTML='';
  const q=document.getElementById('search').value.trim().toLowerCase();
  const list=q?S.menu.filter(m=>m.name.toLowerCase().includes(q))
              :S.menu.filter(m=>m.cat===currentCat);
  list.forEach(m=>{const b=document.createElement('button');b.className='prod';
    b.innerHTML=`<span class="p-name">${m.name}</span><span class="p-price">${money(m.price)}</span>`;
    b.onclick=()=>addToOrder(m);grid.appendChild(b);});
}
function addToOrder(m){
  const o=curOrder();if(o.id===null){o.id=S.nextOrderId++;o.opened=Date.now();}
  const ex=o.lines.find(l=>l.name===m.name&&l.price===m.price&&!l.note);
  if(ex)ex.qty++;else o.lines.push({name:m.name,price:m.price,qty:1,note:'',sent:false});
  o.readyToPay=false;save();renderOrder();
}
function addCustom(){
  const q=document.getElementById('search').value.trim();
  askModal('Producto suelto',q,name=>{
    if(!name)return;
    const p=prompt('Precio de "'+name+'":','0');if(p===null)return;
    addToOrder({name:name,price:parseInt(p)||0});
    document.getElementById('search').value='';renderProds();
  });
}
function renderOrder(){
  const o=curOrder();
  document.getElementById('ordId').textContent=o.id?('Pedido #'+o.id):'Pedido nuevo';
  document.getElementById('ordTime').textContent=fdate(o.opened);
  document.getElementById('ordClient').value=o.cliente||'';
  const list=document.getElementById('orderList');list.innerHTML='';
  if(!o.lines.length)list.innerHTML='<div class="empty">Tocá un producto para sumarlo a la mesa</div>';
  o.lines.forEach((l,i)=>{
    const row=document.createElement('div');row.className='line';
    row.innerHTML=`
      <div class="l-qtybox">
        <button data-i="${i}" data-a="minus">−</button>
        <span>${l.qty}</span>
        <button data-i="${i}" data-a="plus">+</button>
      </div>
      <div class="l-main">
        <div class="l-name">${l.name}${l.sent?'<span class="sent">cocina</span>':''}</div>
        ${l.note?`<div class="l-note">↳ ${l.note}</div>`:''}
        <button class="l-note-btn" data-i="${i}" data-a="note">✎ nota</button>
      </div>
      <div class="l-sub">${money(l.price*l.qty)}</div>
      <button class="l-x" data-i="${i}" data-a="del">✕</button>`;
    list.appendChild(row);
  });
  list.querySelectorAll('button').forEach(b=>b.onclick=()=>lineAction(+b.dataset.i,b.dataset.a));
  const sub=o.lines.reduce((s,l)=>s+l.price*l.qty,0);
  const disc=sub*(o.discount||0)/100;
  document.getElementById('ordSub').textContent=money(sub);
  const dr=document.getElementById('discRow');
  if(o.discount){dr.style.display='flex';
    document.getElementById('discLbl').textContent='Descuento '+o.discount+'%';
    document.getElementById('discAmt').textContent='-'+money(disc);}
  else dr.style.display='none';
  document.getElementById('ordTotal').textContent=money(sub-disc);
  const pending=o.lines.some(l=>!l.sent);
  const kb=document.getElementById('kitchenBtn');kb.disabled=!pending;
  kb.textContent=pending?'🍳 Comanda':'🍳 Enviado';
}
function lineAction(i,a){
  const o=curOrder(),l=o.lines[i];
  if(a==='plus')l.qty++;
  else if(a==='minus'){l.qty--;if(l.qty<=0)o.lines.splice(i,1)}
  else if(a==='del')o.lines.splice(i,1);
  else if(a==='note'){askModal('Nota para '+l.name,l.note,v=>{if(v!==null){l.note=v;save();renderOrder()}},
    'Ej: sin cebolla, bien frío...');return;}
  save();renderOrder();
}
function setClient(v){curOrder().cliente=v;save()}
function askDiscount(){askModal('Descuento (%)',curOrder().discount||'',v=>{
  if(v===null)return;setDiscount(Math.max(0,Math.min(100,parseFloat(v)||0)));});}
function setDiscount(p){curOrder().discount=p;save();renderOrder()}

function aggregate(lines){
  const map={};
  lines.forEach(l=>{const k=l.name+'|'+l.price;
    if(!map[k])map[k]={name:l.name,price:l.price,qty:0};map[k].qty+=l.qty;});
  return Object.values(map);
}
function sendToKitchen(){
  const o=curOrder(),nuevos=o.lines.filter(l=>!l.sent);
  if(!nuevos.length)return;
  printKitchen(nuevos);
  nuevos.forEach(l=>l.sent=true);save();renderOrder();
}
function printTicket(){
  const o=curOrder();if(!o.lines.length){alert('La mesa está vacía');return;}
  printControl(o);
  setTimeout(()=>{if(confirm('¿Cobrada? Liberar la mesa.')){delete S.orders[currentTable];save();showMap();}},400);
}

/* ============ IMPRESIÓN ============ */
function printKitchen(lines){
  const tb=curSala().tables.find(x=>x.id===currentTable);
  let h='<div class="rcpt"><div class="r-c r-title">COMANDA COCINA</div>';
  h+=`<div class="r-c">Mesa ${tb.name} · ${curSala().name}</div>`;
  h+=`<div class="r-c">${fdate(Date.now())}</div><div class="sp"></div>`;
  aggregate(lines).forEach(l=>{
    h+=`<div class="r-line big"><span>${l.qty} x ${l.name}</span></div>`;
    // notas de esta tanda
    lines.filter(x=>x.name===l.name&&x.note).forEach(x=>h+=`<div class="r-note">↳ ${x.note}</div>`);
  });
  h+='</div>';
  doPrint(h);
}
function printControl(o){
  const tb=curSala().tables.find(x=>x.id===currentTable);
  const agg=aggregate(o.lines);
  const sub=o.lines.reduce((s,l)=>s+l.price*l.qty,0);
  const disc=sub*(o.discount||0)/100;
  let h='<div class="rcpt">';
  h+='<div class="r-c r-title">CONTROL DE MESA</div><div class="sp"></div>';
  h+=`<div>Pedido: #${o.id||'-'}</div>`;
  h+=`<div>Fecha: ${fdate(o.opened)}</div>`;
  h+=`<div>Mesa: ${tb.name}${o.cliente?' · '+o.cliente:''}</div><div class="sp"></div>`;
  agg.forEach(l=>{h+=line2(`${l.qty}  ${l.name}`,num(l.price*l.qty));});
  h+=line2('Subtotal',num(sub));
  if(o.discount){h+='<div class="sp"></div>';
    h+=line2(`DESCUENTO ${o.discount} %`,'-'+num(disc));
    h+=line2('Subtotal',num(sub-disc));}
  h+='<div class="sp"></div>';
  h+=`<div class="r-line big"><span>Total</span><span class="amt">${num(sub-disc)}</span></div>`;
  h+='<div class="sp"></div><div class="sp"></div>';
  h+='<div class="r-c">DOCUMENTO NO VALIDO COMO FACTURA</div>';
  h+=`<div class="r-c">${S.ticketFoot}</div>`;
  h+='</div>';
  doPrint(h);
}
function line2(left,right){return `<div class="r-line"><span>${left}</span><span class="amt">${right}</span></div>`}
function doPrint(html){document.getElementById('printArea').innerHTML=html;window.print();}

/* ============ CONFIG ============ */
function openConfig(){
  document.getElementById('cfgName').value=S.restaurant;
  document.getElementById('cfgFoot').value=S.ticketFoot;
  renderMenuEditor();showScreen('configScreen');
}
function renderMenuEditor(){
  const box=document.getElementById('menuEditor');box.innerHTML='';
  S.menu.forEach((m,i)=>{const row=document.createElement('div');row.className='mi-row';
    row.innerHTML=`<input class="cat" value="${esc(m.cat)}" data-i="${i}" data-f="cat" placeholder="Categoría">
      <input value="${esc(m.name)}" data-i="${i}" data-f="name" placeholder="Producto">
      <input class="price" type="number" value="${m.price}" data-i="${i}" data-f="price" placeholder="Precio">
      <button class="del" data-i="${i}">×</button>`;box.appendChild(row);});
  box.querySelectorAll('input').forEach(inp=>inp.oninput=()=>{const m=S.menu[+inp.dataset.i];
    m[inp.dataset.f]=inp.dataset.f==='price'?(+inp.value||0):inp.value;});
  box.querySelectorAll('.del').forEach(b=>b.onclick=()=>{S.menu.splice(+b.dataset.i,1);renderMenuEditor();});
}
function addMenuItem(){
  const lastCat=S.menu.length?S.menu[S.menu.length-1].cat:'General';
  S.menu.push({id:t(),cat:lastCat,name:'',price:0});renderMenuEditor();
  document.getElementById('menuEditor').lastChild.querySelector('input[data-f=name]').focus();
}
function saveConfig(){
  S.restaurant=document.getElementById('cfgName').value||'Leben Brewing Co';
  S.ticketFoot=document.getElementById('cfgFoot').value;
  S.menu=S.menu.filter(m=>m.name.trim());
  save();document.getElementById('brandName').textContent=S.restaurant;showMap();
}

/* ============ NAV / MODAL ============ */
function showScreen(id){
  document.querySelectorAll('.overlay').forEach(o=>o.classList.remove('show'));
  if(id!=='map')document.getElementById(id).classList.add('show');
  document.getElementById('navMap').classList.toggle('active',id==='map');
}
function showMap(){
  if(currentTable){const o=S.orders[currentTable];if(o&&!o.lines.length)delete S.orders[currentTable];save();currentTable=null;}
  showScreen('map');if(editMode)toggleEdit();renderSalaTabs();renderMap();
}
function editRestaurantName(){askModal('Nombre del local',S.restaurant,v=>{
  if(v){S.restaurant=v;save();document.getElementById('brandName').textContent=v;}});}
function askModal(title,val,cb,ph){
  document.getElementById('modalTitle').textContent=title;
  const inp=document.getElementById('modalInput');inp.value=val||'';inp.placeholder=ph||'';
  modalCb=cb;document.getElementById('modal').classList.add('show');
  setTimeout(()=>inp.focus(),50);
  inp.onkeydown=e=>{if(e.key==='Enter')confirmModal();};
}
function confirmModal(){const v=document.getElementById('modalInput').value;closeModal();if(modalCb)modalCb(v);}
function closeModal(){document.getElementById('modal').classList.remove('show');}

/* ============ INIT ============ */
applyTheme();
document.getElementById('brandName').textContent=S.restaurant;
currentSala=S.salas[0].id;
renderSalaTabs();renderMap();
</script>
</body>
